<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Cyber Tools Index</title>
<meta name="description" content="A searchable index of free web-based cybersecurity tools — threat intel, malware analysis, OSINT, vulnerability research and more.">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --bg-surface: #161b22;
    --bg-card: #161b22;
    --bg-hover: #1c2128;
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.16);
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --text-muted: #484f58;
    --accent: #58a6ff;
    --accent-dim: rgba(88,166,255,0.12);
    --green: #3fb950;
    --green-dim: rgba(63,185,80,0.12);
    --purple: #bc8cff;
    --purple-dim: rgba(188,140,255,0.12);
    --coral: #ff7b72;
    --coral-dim: rgba(255,123,114,0.12);
    --amber: #d29922;
    --amber-dim: rgba(210,153,34,0.12);
    --teal: #39d353;
    --teal-dim: rgba(57,211,83,0.1);
    --pink: #f778ba;
    --pink-dim: rgba(247,120,186,0.12);
    --gray-dim: rgba(139,148,158,0.12);
    --star: #e3b341;
    --star-dim: rgba(227,179,65,0.15);
    --radius: 8px;
    --radius-lg: 12px;
    --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    line-height: 1.6;
  }

  .site-header {
    border-bottom: 1px solid var(--border);
    padding: 0 clamp(1rem, 4vw, 3rem);
  }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem 0 2.5rem;
  }
  .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.75rem;
  }
  h1 {
    font-size: clamp(1.75rem, 4vw, 2.5rem);
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.02em;
    line-height: 1.2;
    margin-bottom: 0.5rem;
  }
  .header-sub {
    font-size: 15px;
    color: var(--text-secondary);
    max-width: 560px;
  }
  .header-meta {
    display: flex;
    gap: 1.5rem;
    margin-top: 1.25rem;
    flex-wrap: wrap;
  }
  .meta-pill {
    font-size: 12px;
    font-family: var(--mono);
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .meta-pill span { color: var(--green); }
  .meta-pill.fav-meta span { color: var(--star); }

  .controls-bar {
    padding: 0 clamp(1rem, 4vw, 3rem);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(13,17,23,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 10;
  }
  .controls-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 1rem 0;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
    max-width: 360px;
  }
  .search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    width: 15px;
    height: 15px;
    color: var(--text-muted);
    pointer-events: none;
  }
  #search {
    width: 100%;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 12px 8px 34px;
    font-size: 13px;
    color: var(--text-primary);
    outline: none;
    font-family: inherit;
    transition: border-color 0.15s;
  }
  #search::placeholder { color: var(--text-muted); }
  #search:focus { border-color: var(--accent); }

  .filter-scroll {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 5px 12px;
    font-size: 12px;
    font-family: inherit;
    border: 1px solid var(--border);
    border-radius: 99px;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .filter-btn:hover { border-color: var(--border-hover); color: var(--text-primary); }
  .filter-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }
  .filter-btn.fav-filter { }
  .filter-btn.fav-filter.active {
    background: var(--star-dim);
    border-color: var(--star);
    color: var(--star);
  }
  .fav-count-badge {
    background: var(--star-dim);
    color: var(--star);
    font-size: 10px;
    font-family: var(--mono);
    padding: 1px 6px;
    border-radius: 99px;
    min-width: 18px;
    text-align: center;
    display: none;
  }
  .fav-count-badge.visible { display: inline-block; }

  .count-badge {
    margin-left: auto;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--text-muted);
    white-space: nowrap;
  }
  .count-badge strong { color: var(--text-secondary); }

  .grid-wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 1.75rem clamp(1rem, 4vw, 3rem) 4rem;
  }
  .tools-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 10px;
  }

  .tool-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
  }
  .tool-card:hover { border-color: var(--border-hover); background: var(--bg-hover); }
  .tool-card.is-fav { border-color: rgba(227,179,65,0.25); }
  .tool-card.is-fav:hover { border-color: rgba(227,179,65,0.45); }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
  }
  .tool-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.01em;
  }
  .card-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .btn-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
    flex-shrink: 0;
  }
  .btn-icon:hover { border-color: var(--border-hover); color: var(--text-primary); background: var(--bg-hover); }
  .btn-icon svg { width: 13px; height: 13px; }
  .btn-icon.copied { border-color: var(--green); color: var(--green); background: var(--green-dim); }

  /* Star button */
  .star-btn { }
  .star-btn svg { width: 14px; height: 14px; transition: transform 0.15s; }
  .star-btn:hover svg { transform: scale(1.2); }
  .star-btn.starred {
    border-color: var(--star);
    color: var(--star);
    background: var(--star-dim);
  }
  .star-btn.starred svg { fill: var(--star); }

  .tool-desc {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.55;
    flex: 1;
  }
  .card-tags {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }
  .tag {
    font-size: 10px;
    font-family: var(--mono);
    letter-spacing: 0.05em;
    padding: 2px 8px;
    border-radius: 99px;
    font-weight: 500;
  }
  .tag-scan    { background: var(--accent-dim);  color: var(--accent);  }
  .tag-intel   { background: var(--green-dim);   color: var(--green);   }
  .tag-osint   { background: var(--purple-dim);  color: var(--purple);  }
  .tag-malware { background: var(--coral-dim);   color: var(--coral);   }
  .tag-network { background: var(--teal-dim);    color: #3fb950;        }
  .tag-vuln    { background: var(--amber-dim);   color: var(--amber);   }
  .tag-breach  { background: var(--pink-dim);    color: var(--pink);    }
  .tag-domain  { background: var(--gray-dim);    color: var(--text-secondary); }
  .tag-sandbox { background: var(--purple-dim);  color: var(--purple);  }

  #toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--bg-surface);
    border: 1px solid var(--green);
    color: var(--green);
    font-size: 13px;
    font-family: var(--mono);
    padding: 8px 18px;
    border-radius: 99px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 100;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.toast-star { border-color: var(--star); color: var(--star); }

  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-muted);
  }
  .empty-state svg { width: 32px; height: 32px; margin-bottom: 1rem; opacity: 0.4; }
  .empty-state p { font-size: 14px; }

  footer {
    border-top: 1px solid var(--border);
    padding: 1.5rem clamp(1rem, 4vw, 3rem);
    text-align: center;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--text-muted);
  }

  @media (max-width: 600px) {
    .tools-grid { grid-template-columns: 1fr; }
    .header-meta { gap: 1rem; }
    .count-badge { display: none; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { transition: none !important; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <p class="eyebrow">// security toolkit</p>
    <h1>Free Cyber Tools Index</h1>
    <p class="header-sub">A curated index of free, web-based cybersecurity tools — verified to work without a paid account.</p>
    <div class="header-meta">
      <span class="meta-pill">&#9679; <span id="total-count">0</span> tools indexed</span>
      <span class="meta-pill">&#9679; <span>free &amp; web-based</span></span>
      <span class="meta-pill fav-meta">&#9733; <span id="fav-meta-count">0</span> favourited</span>
    </div>
  </div>
</header>

<div class="controls-bar">
  <div class="controls-inner">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <circle cx="6.5" cy="6.5" r="4.5"/><path d="M10.5 10.5l3 3"/>
      </svg>
      <input type="search" id="search" placeholder="Search tools..." autocomplete="off" spellcheck="false" aria-label="Search tools">
    </div>
    <div class="filter-scroll" role="group" aria-label="Filter by category">
      <button class="filter-btn active" data-cat="all">All</button>
      <button class="filter-btn" data-cat="scan">URL / File scan</button>
      <button class="filter-btn" data-cat="intel">Threat intel</button>
      <button class="filter-btn" data-cat="osint">OSINT</button>
      <button class="filter-btn" data-cat="malware">Malware</button>
      <button class="filter-btn" data-cat="network">Network / IoT</button>
      <button class="filter-btn" data-cat="vuln">Vulnerabilities</button>
      <button class="filter-btn" data-cat="breach">Breach / Creds</button>
      <button class="filter-btn" data-cat="domain">Domain / DNS</button>
      <button class="filter-btn fav-filter" data-cat="favourites">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true" style="width:12px;height:12px"><path d="M8 2.5l1.545 3.13 3.455.502-2.5 2.437.59 3.44L8 10.385l-3.09 1.624.59-3.44L3 6.132l3.455-.502L8 2.5z"/></svg>
        Favourites
        <span class="fav-count-badge" id="fav-filter-count">0</span>
      </button>
    </div>
    <span class="count-badge"><strong id="shown-count">0</strong> shown</span>
  </div>
</div>

<main class="grid-wrap">
  <div class="tools-grid" id="grid" role="list" aria-label="Cybersecurity tools"></div>
</main>

<div id="toast" role="status" aria-live="polite"></div>

<footer>
  free cyber tools index &mdash; all tools are third-party services &mdash; always verify before use
</footer>

  {name:"Have I Been Pwned",url:"https://haveibeenpwned.com",desc:"Check if your email address has appeared in a known data breach. Billions of records indexed.",cats:["breach"],tags:["breach"]},
  {name:"Pwned Passwords",url:"https://haveibeenpwned.com/Passwords",desc:"Check individual passwords against billions of breach records using k-anonymity — your password is never sent.",cats:["breach"],tags:["breach"]},
  {name:"EmailRep",url:"https://emailrep.io",desc:"Check the reputation and risk score of any email address based on breach data, activity, and patterns.",cats:["breach","intel"],tags:["breach","intel"]},

  // ── Domain / DNS ──
  {name:"MXToolbox",url:"https://mxtoolbox.com",desc:"Free DNS lookups, MX record checks, blacklist monitoring, and email deliverability diagnostic tools.",cats:["domain","network"],tags:["domain","network"]},
  {name:"DNSDumpster",url:"https://dnsdumpster.com",desc:"Free domain research tool for DNS recon and host discovery. Maps DNS records and related subdomains.",cats:["domain","osint"],tags:["domain","osint"]},
  {name:"WHOIS Lookup",url:"https://who.is",desc:"Look up domain registration details — registrar, creation date, name servers, and contact info.",cats:["domain","osint"],tags:["domain","osint"]},
  {name:"DomainTools WHOIS",url:"https://whois.domaintools.com",desc:"Advanced WHOIS lookup with historical records, reverse IP, and domain ownership history.",cats:["domain","osint"],tags:["domain","osint"]},
  {name:"ViewDNS.info",url:"https://viewdns.info",desc:"Collection of DNS, WHOIS, and network tools: reverse IP, DNS propagation, traceroute, and more.",cats:["domain","network"],tags:["domain","network"]},
  {name:"Robtex",url:"https://www.robtex.com",desc:"DNS and network intelligence — maps IP and domain relationships, reverse lookups, and BGP data.",cats:["domain","network"],tags:["domain","network"]},

 // ── Study ──
  {name:"Paul Jerimy Cyber Roadmap",url:"https://pauljerimy.com/security-certification-roadmap/",desc:"Cyber Security Study Paths",cats:["Study"],tags:["Study","Roadmap"]},
];

const TAG_CLASS = {scan:"tag-scan",intel:"tag-intel",osint:"tag-osint",malware:"tag-malware",network:"tag-network",vuln:"tag-vuln",breach:"tag-breach",domain:"tag-domain",sandbox:"tag-sandbox"};
const TAG_LABEL = {scan:"url/file scan",intel:"threat intel",osint:"osint",malware:"malware",network:"network/iot",vuln:"vulns",breach:"breach/creds",domain:"domain/dns",sandbox:"sandbox"};
const LS_KEY = "cyber-tools-favs";

let activeCat = "all";
let searchQ = "";
let toastTimer = null;
let favs = new Set();

// Load favourites from localStorage
try {
  const saved = localStorage.getItem(LS_KEY);
  if (saved) favs = new Set(JSON.parse(saved));
} catch(e) {}

function saveFavs() {
  try { localStorage.setItem(LS_KEY, JSON.stringify([...favs])); } catch(e) {}
}

function toggleFav(name) {
  if (favs.has(name)) {
    favs.delete(name);
    showToast("Removed from favourites", false);
  } else {
    favs.add(name);
    showToast("Added to favourites", true);
  }
  saveFavs();
  updateFavCounts();
  render();
}

function updateFavCounts() {
  const count = favs.size;
  document.getElementById("fav-meta-count").textContent = count;
  document.getElementById("fav-filter-count").textContent = count;
  const badge = document.getElementById("fav-filter-count");
  badge.classList.toggle("visible", count > 0);
}

document.getElementById("total-count").textContent = TOOLS.length;
updateFavCounts();

function render() {
  const grid = document.getElementById("grid");
  const q = searchQ.toLowerCase();

  const filtered = TOOLS.filter(t => {
    if (activeCat === "favourites") return favs.has(t.name);
    const catOk = activeCat === "all" || t.cats.includes(activeCat);
    const srchOk = !q || t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q) || t.tags.some(g => g.includes(q));
    return catOk && srchOk;
  });

  // Sort: favourites first within any view
  filtered.sort((a, b) => {
    if (activeCat !== "favourites") {
      const af = favs.has(a.name) ? 0 : 1;
      const bf = favs.has(b.name) ? 0 : 1;
      return af - bf;
    }
    return 0;
  });

  document.getElementById("shown-count").textContent = filtered.length;

  if (filtered.length === 0) {
    const msg = activeCat === "favourites"
      ? "No favourites yet — click the ★ on any tool card to save it here."
      : `No tools match &ldquo;${q || activeCat}&rdquo; &mdash; try clearing the search or filter.`;
    grid.innerHTML = `<div class="empty-state" role="status">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      <p>${msg}</p>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map(t => {
    const isFav = favs.has(t.name);
    return `
    <div class="tool-card${isFav ? " is-fav" : ""}" role="listitem">
      <div class="card-top">
        <span class="tool-name">${t.name}</span>
        <div class="card-actions">
          <button class="btn-icon star-btn${isFav ? " starred" : ""}" data-name="${t.name}" title="${isFav ? "Remove from favourites" : "Add to favourites"}" aria-label="${isFav ? "Remove" : "Add"} ${t.name} ${isFav ? "from" : "to"} favourites" aria-pressed="${isFav}">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M8 2.5l1.545 3.13 3.455.502-2.5 2.437.59 3.44L8 10.385l-3.09 1.624.59-3.44L3 6.132l3.455-.502L8 2.5z"/></svg>
          </button>
          <button class="btn-icon copy-btn" data-url="${t.url}" title="Copy URL" aria-label="Copy URL for ${t.name}">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><rect x="5" y="5" width="9" height="9" rx="1.5"/><path d="M3 11V3a1 1 0 011-1h8"/></svg>
          </button>
          <a class="btn-icon" href="${t.url}" target="_blank" rel="noopener noreferrer" title="Open ${t.name}" aria-label="Open ${t.name} in new tab">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M6 3H3a1 1 0 00-1 1v9a1 1 0 001 1h9a1 1 0 001-1v-3"/><path d="M9 2h5v5"/><path d="M14 2L8 8"/></svg>
          </a>
        </div>
      </div>
      <p class="tool-desc">${t.desc}</p>
      <div class="card-tags">${t.tags.map(tag => `<span class="tag ${TAG_CLASS[tag] || "tag-intel"}">${TAG_LABEL[tag] || tag}</span>`).join("")}</div>
    </div>`;
  }).join("");
}

// Search
document.getElementById("search").addEventListener("input", e => {
  searchQ = e.target.value;
  render();
});

// Category filters
document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeCat = btn.dataset.cat;
    render();
  });
});

// Card button clicks (star + copy)
document.getElementById("grid").addEventListener("click", e => {
  const starBtn = e.target.closest(".star-btn");
  if (starBtn) { toggleFav(starBtn.dataset.name); return; }

  const copyBtn = e.target.closest(".copy-btn");
  if (copyBtn) {
    const url = copyBtn.dataset.url;
    navigator.clipboard.writeText(url).then(() => {
      copyBtn.classList.add("copied");
      showToast("URL copied", null);
      setTimeout(() => copyBtn.classList.remove("copied"), 2000);
    }).catch(() => {
      const ta = document.createElement("textarea");
      ta.value = url; ta.style.position = "fixed"; ta.style.opacity = "0";
      document.body.appendChild(ta); ta.select(); document.execCommand("copy");
      document.body.removeChild(ta);
      showToast("URL copied", null);
    });
  }
});

function showToast(msg, isStar) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = isStar === true ? "show toast-star" : isStar === false ? "show" : "show";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2200);
}

render();
</script>
</body>
</html>
